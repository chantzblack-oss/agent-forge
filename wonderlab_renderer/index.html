<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wonderlab - Money</title>
    <link rel="stylesheet" href="./styles.css?v=20260608-studio2">
  </head>
  <body>
    <div class="app-shell">
      <aside class="run-rail" aria-label="Episode scenes">
        <div class="brand-lockup">
          <span class="brand-mark">W</span>
          <span>Wonderlab</span>
        </div>
        <div class="run-meta" id="runMeta"></div>
        <nav class="scene-nav" id="sceneNav"></nav>
      </aside>

      <main class="episode" id="episodeRoot">
        <section class="hero-scene" id="heroScene">
          <canvas id="heroCanvas" aria-hidden="true"></canvas>
          <div class="hero-copy">
            <div class="artifact-line" id="artifactLine">Agent Forge run</div>
            <h1 id="episodeTitle">Loading Wonderlab</h1>
            <p id="episodeSubtitle"></p>
            <div class="hero-actions">
              <a class="command-button" href="#scene-barter-game">
                <span aria-hidden="true">01</span>
                Begin
              </a>
              <button class="command-button secondary" id="openStudio" type="button">
                <span aria-hidden="true">*</span>
                Studio
              </button>
              <button class="command-button secondary" id="openSources" type="button">
                <span aria-hidden="true">#</span>
                Sources
              </button>
            </div>
          </div>
        </section>

        <section class="studio-strip" aria-label="Agent Forge run stages">
          <div class="studio-track" id="studioTrack"></div>
        </section>

        <section class="scene-stack" id="sceneStack"></section>
      </main>

      <aside class="source-drawer" id="sourceDrawer" aria-label="Source lens">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Source Lens</p>
            <h2>Claim ledger</h2>
          </div>
          <button class="icon-button" id="closeSources" type="button" aria-label="Close source lens">x</button>
        </div>
        <div class="drawer-tabs" role="tablist">
          <button class="drawer-tab active" type="button" data-tab="claims">Claims</button>
          <button class="drawer-tab" type="button" data-tab="sources">Sources</button>
          <button class="drawer-tab" type="button" data-tab="eval">Eval</button>
        </div>
        <div class="drawer-panel active" id="claimsPanel"></div>
        <div class="drawer-panel" id="sourcesPanel"></div>
        <div class="drawer-panel" id="evalPanel"></div>
      </aside>

      <aside class="studio-drawer" id="studioDrawer" aria-label="Wonderlab Studio">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Agent Forge Studio</p>
            <h2>Build console</h2>
          </div>
          <button class="icon-button" id="closeStudio" type="button" aria-label="Close studio">x</button>
        </div>

        <form class="studio-form" id="studioForm">
          <label for="topicInput">Topic</label>
          <div class="topic-row">
            <input id="topicInput" name="topic" type="text" value="Money: The Shared Fiction That Runs the World">
            <button class="command-button" type="submit">Run</button>
          </div>

          <fieldset class="mode-control">
            <legend>Depth</legend>
            <label><input type="radio" name="mode" value="quick"> Quick</label>
            <label><input type="radio" name="mode" value="deep" checked> Deep</label>
            <label><input type="radio" name="mode" value="masterpiece"> Masterpiece</label>
          </fieldset>
        </form>

        <div class="studio-status" id="studioStatus"></div>
        <div class="publish-gate" id="publishGate"></div>
        <div class="studio-actions">
          <button class="command-button secondary" id="focusBlockers" type="button">Blockers</button>
          <button class="command-button secondary" id="downloadArtifact" type="button">Export JSON</button>
        </div>
        <div class="studio-section" id="studioDossier"></div>
      </aside>
    </div>

    <script src="./app.js?v=20260608-studio"></script>
  </body>
</html>
